name: Commit build

on:
  push:
    branches:
      - master
  # Allow manual triggering from the Actions tab, useful for re-running
  # a build without pushing a new commit.
  workflow_dispatch:

jobs:
  android-build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.32.6

      - name: Get Dependencies
        run: flutter pub get

      # serious_python requires a two-step build on Android:
      #
      #   1. `dart run serious_python:main package <src> -p Android ...`
      #      which prepares per-ABI directories under
      #      $SERIOUS_PYTHON_SITE_PACKAGES (one subdir per arm64-v8a
      #      / armeabi-v7a / x86_64) by pulling CPython runtime plus
      #      Python dependencies from pypi.flet.dev. It also
      #      (over)writes app/app.zip with the contents of `resolver/`.
      #   2. `flutter build apk` then reads $SERIOUS_PYTHON_SITE_PACKAGES
      #      in the plugin's Gradle script and produces libpyjni.so +
      #      libpythonbundle.so + libpythonsitepackages.so for each
      #      ABI inside the final APK.
      #
      # The upstream repo (majusss/purevideo) runs step 1 locally
      # before publishing releases, which is why their CI workflow
      # looks deceptively simple. We run it in CI so release builds
      # are fully reproducible without relying on a maintainer's
      # machine.
      #
      # NOTE: the `package` command will REWRITE app/app.zip with the
      # contents of resolver/. That is fine — resolver/ already
      # contains the full libresolveurl source (it's the canonical
      # pre-zip form), so the rewritten archive is identical byte-wise
      # on a clean checkout.
      - name: Prepare Python site-packages for serious_python
        env:
          SERIOUS_PYTHON_SITE_PACKAGES: ${{ github.workspace }}/build/site-packages
        run: |
          mkdir -p "$SERIOUS_PYTHON_SITE_PACKAGES"
          dart run serious_python:main package resolver \
            --platform Android \
            --requirements "-r,resolver/requirements.txt"
          echo "SERIOUS_PYTHON_SITE_PACKAGES=$SERIOUS_PYTHON_SITE_PACKAGES" >> $GITHUB_ENV
          echo "--- site-packages tree (depth 3) ---"
          find "$SERIOUS_PYTHON_SITE_PACKAGES" -maxdepth 3 | head -40 || true

      - name: Generate keystore or decode from secret
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Using keystore from KEYSTORE_BASE64 secret"
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
            echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
            echo "storeFile=keystore.jks" >> android/key.properties
          else
            echo "No keystore secret found, generating a local keystore"
            keytool -genkey -v \
              -keystore android/app/keystore.jks \
              -alias purevideo \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass purevideo -keypass purevideo \
              -dname "CN=PureVideo, OU=Dev, O=PureVideo, L=NA, ST=NA, C=PL"
            echo "storePassword=purevideo" > android/key.properties
            echo "keyPassword=purevideo" >> android/key.properties
            echo "keyAlias=purevideo" >> android/key.properties
            echo "storeFile=keystore.jks" >> android/key.properties
          fi

      - name: Build release APK
        # Fat APK (all ABIs that serious_python ships). The env var
        # set above is read by serious_python_android's Gradle plugin
        # to pack libpyjni.so / libpythonbundle.so /
        # libpythonsitepackages.so into the right lib/<abi>/
        # directories inside the APK.
        env:
          SERIOUS_PYTHON_SITE_PACKAGES: ${{ github.workspace }}/build/site-packages
        run: flutter build apk --release

      - name: Inspect final release APK (deep diagnostics)
        if: always()
        run: |
          APK=build/app/outputs/flutter-apk/app-release.apk
          if [ ! -f "$APK" ]; then
            echo "No release APK to inspect"
            exit 0
          fi
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -n1)
          AAPT2="$BUILD_TOOLS_DIR/aapt2"
          APKSIGNER="$BUILD_TOOLS_DIR/apksigner"

          echo "================================================================"
          echo "  1. Badging (shows applicationId, versionCode, launcher, ABIs)"
          echo "================================================================"
          "$AAPT2" dump badging "$APK" || true

          echo ""
          echo "================================================================"
          echo "  2. Required vs optional uses-feature"
          echo "================================================================"
          "$AAPT2" dump badging "$APK" | grep -E "uses-feature|uses-permission|sdkVersion|native-code|supports-screens" || true

          echo ""
          echo "================================================================"
          echo "  3. Merged AndroidManifest.xml (first 300 lines)"
          echo "================================================================"
          "$AAPT2" dump xmltree "$APK" --file AndroidManifest.xml | head -300 || true

          echo ""
          echo "================================================================"
          echo "  4. Native libraries inside APK"
          echo "================================================================"
          unzip -l "$APK" | grep -E "\.so$|lib/" | head -50 || true

          echo ""
          echo "================================================================"
          echo "  5. Signature scheme verification"
          echo "================================================================"
          "$APKSIGNER" verify --verbose --print-certs "$APK" || true

          echo ""
          echo "================================================================"
          echo "  6. APK summary"
          echo "================================================================"
          ls -lh "$APK"
          unzip -l "$APK" | tail -1

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: purevideo-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: warn
