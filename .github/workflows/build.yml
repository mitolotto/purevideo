name: Commit build

on:
  push:
    branches:
      - master
  # Allow manual triggering from the Actions tab, useful for re-running
  # a build without pushing a new commit.
  workflow_dispatch:

jobs:
  android-build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Full history so later steps that inspect tags/commits work.
          # The previous `git pull` step (which was failing with exit 128)
          # is no longer needed because checkout already gives us the
          # correct ref.
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.32.6

      - name: Set up Python
        # The serious_python plugin needs a set of pre-built Python
        # site-packages at build time. We install the project's Python
        # dependencies into a local folder and point the plugin at it
        # via SERIOUS_PYTHON_SITE_PACKAGES.
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare Python site-packages for serious_python
        run: |
          mkdir -p $GITHUB_WORKSPACE/serious_python_site_packages
          if [ -f resolver/requirements.txt ]; then
            pip install --target=$GITHUB_WORKSPACE/serious_python_site_packages -r resolver/requirements.txt
          else
            echo "No resolver/requirements.txt found, creating empty site-packages directory"
          fi
          echo "SERIOUS_PYTHON_SITE_PACKAGES=$GITHUB_WORKSPACE/serious_python_site_packages" >> $GITHUB_ENV

      - name: Get Dependencies
        run: flutter pub get

      - name: Generate keystore or decode from secret
        # If the KEYSTORE_BASE64 secret is configured, use the real
        # keystore from it (Play Store-ready signing). Otherwise create
        # a local keystore on the fly so the release build can still be
        # signed. The resulting APK installs perfectly on Android TV for
        # sideloading, it just cannot be uploaded to the Play Store.
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Using keystore from KEYSTORE_BASE64 secret"
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
            echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
            echo "storeFile=keystore.jks" >> android/key.properties
          else
            echo "No keystore secret found, generating a local keystore"
            keytool -genkey -v \
              -keystore android/app/keystore.jks \
              -alias purevideo \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass purevideo -keypass purevideo \
              -dname "CN=PureVideo, OU=Dev, O=PureVideo, L=NA, ST=NA, C=PL"
            echo "storePassword=purevideo" > android/key.properties
            echo "keyPassword=purevideo" >> android/key.properties
            echo "keyAlias=purevideo" >> android/key.properties
            echo "storeFile=keystore.jks" >> android/key.properties
          fi

      - name: Build APK
        # Build only for arm64 — this is the architecture used by every
        # modern Android TV stick, TV box and TV itself, and avoids
        # pulling in x86 native assets that most TVs do not need.
        run: flutter build apk --release --target-platform android-arm64

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: purevideo-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
