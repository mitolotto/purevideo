name: purevideo
description: ""
publish_to: "none"
version: 0.0.0+0

environment:
  sdk: ">=3.1.3 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.0
  dio: ^5.9.0
  get_it: ^8.3.0
  go_router: ^14.8.1
  hive: ^2.2.3
  html: ^0.15.4
  flutter_inappwebview: ^6.1.5
  flutter_secure_storage: ^9.2.4
  equatable: ^2.0.7
  package_info_plus: ^8.3.1
  shared_preferences: ^2.5.3
  async: any
  path_provider: ^2.1.5
  hive_flutter: ^1.1.0
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.6
  screen_brightness: ^2.1.3
  firebase_core: ^3.15.2
  firebase_analytics: ^11.6.0
  firebase_crashlytics: ^4.3.10
  pointycastle: ^4.0.0
  fast_cached_network_image: ^1.3.3+5
  collection: any
  url_launcher: ^6.3.2
  # flutter_cast_framework intentionally NOT listed: it crashes on
  # startup on Android TV boxes (Homatics, Amlogic, Nvidia Shield) with
  # DynamiteModule$LoadingException because Google Cast Services are
  # not installable. Casting from a TV box is also conceptually weird
  # since the box itself is a receiver. See PR #8 for the full RCA.
  audio_service: ^0.18.18
  audio_session: ^0.2.2
  pip: ^0.0.3
  diacritic: ^0.1.6
  # serious_python embeds a full CPython interpreter that runs
  # resolver/main.py (bundled into app/app.zip at build time) as a
  # local Flask server on 127.0.0.1:8080. The server wraps the
  # libresolveurl Kodi addon which de-obfuscates embed URLs from
  # voe.sx, vidara.to, boosteradx.online, ultrastream.online and
  # ~300 other hosters into direct .m3u8/.mp4 URLs that media_kit can
  # actually play. Works out of the box on Android TV: no extra CI
  # setup is needed — the default `flutter build apk` invocation
  # packages CPython's .so files via serious_python's own Gradle
  # task. The one trick is packaging: see `android/app/build.gradle.kts`
  # for `doNotStrip` entries and `useLegacyPackaging = true`, both of
  # which are required so that AGP does not strip libpython's symbols
  # and leave runtime dlopen of libpyjni.so failing.
  serious_python: ^0.9.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - app/app.zip
