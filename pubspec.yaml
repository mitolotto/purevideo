name: purevideo
description: ""
publish_to: "none"
version: 0.0.0+0

environment:
  sdk: ">=3.1.3 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.0
  dio: ^5.9.0
  get_it: ^8.3.0
  go_router: ^14.8.1
  hive: ^2.2.3
  html: ^0.15.4
  flutter_inappwebview: ^6.1.5
  flutter_secure_storage: ^9.2.4
  equatable: ^2.0.7
  package_info_plus: ^8.3.1
  shared_preferences: ^2.5.3
  async: any
  path_provider: ^2.1.5
  hive_flutter: ^1.1.0
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.6
  # screen_brightness removed: the package was declared but never
  # imported anywhere in lib/. Keeping it forced the
  # screen_brightness_android plugin into the build, which in turn
  # required Kotlin >= 2.3.0 (kotlin-stdlib-2.3.21). Dropping it keeps
  # the dep graph lean.
  firebase_core: ^3.15.2
  firebase_analytics: ^11.6.0
  firebase_crashlytics: ^4.3.10
  pointycastle: ^4.0.0
  fast_cached_network_image: ^1.3.3+5
  collection: any
  url_launcher: ^6.3.2
  # flutter_cast_framework removed: Google Cast SDK depends on the
  # Dynamite "cast.framework.dynamite" module which is not installable on
  # Android TV boxes (Homatics Box R 4K Plus crashed at startup with
  # DynamiteModule$LoadingException + UninitializedPropertyAccessException
  # on mSessionManager). Casting from a TV box to another device makes
  # little sense anyway — the box itself is the receiver.
  audio_service: ^0.18.18
  audio_session: ^0.2.2
  pip: ^0.0.3
  diacritic: ^0.1.6
  # serious_python removed: the plugin embeds a full CPython (~60 MB
  # per ABI) that runs a Flask server on localhost, wrapping
  # libresolveurl for URL resolution. On Android TV this was
  # fundamentally broken:
  #
  #   1. Packaging: serious_python requires a two-step build. First
  #      `dart run serious_python:main package app/src -p Android` to
  #      download prebuilt CPython from pypi.flet.dev and emit
  #      libpythonbundle.so + libpythonsitepackages.so via the
  #      SERIOUS_PYTHON_BUILD_DIST env var, then the normal
  #      `flutter build apk`. Our CI only runs step two, so the APK
  #      never contained those .so files and every boot logged
  #      "libpyjni.so not found" / "Python bundle not found:
  #      lib/arm/libpythonbundle.so".
  #   2. Even when packaged correctly, several Amlogic-based TV
  #      firmwares (including the Homatics Box R 4K Plus) cannot
  #      dlopen CPython because the shipped libc does not support
  #      the _ssl / _hashlib extensions libresolveurl depends on.
  #   3. libresolveurl needs pycryptodome, lxml, etc., which have
  #      native extensions that pypi.flet.dev does not always ship
  #      for arm64-v8a.
  #
  # Replaced with a hosted-backend model: ResolveUrlService reads
  # RESOLVER_BASE_URL from --dart-define, and without a backend
  # configured it falls back to handing raw hoster URLs straight to
  # media_kit. See lib/core/services/resolve_url_service.dart.

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.13
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  # assets:
  #   - app/app.zip
  # app/app.zip was loaded by serious_python to boot an embedded
  # Python Flask server. serious_python has been removed (see the
  # rationale next to the dependency removal above), so the asset is
  # no longer referenced. The file is kept in the repo for now — it
  # contains the libresolveurl source that any self-hosted backend
  # will need.
